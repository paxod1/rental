  <script>
    // Fail-safe to prevent blank screen due to script loading errors or MIME issues
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      if (url && url.includes('.js') || msg.includes('MIME type')) {
        console.error('Fatal script error detected, clearing storage and redirecting to login...');
        
        // Clear all cookies
        const cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i];
            const eqPos = cookie.indexOf("=");
            const name = eqPos > -1 ? cookie.substr(0, eqPos).trim() : cookie.trim();
            document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
        }
        
        // Clear storage
        localStorage.clear();
        sessionStorage.clear();
        
        // Redirect to login to force a clean slate
        if (window.location.pathname !== '/login') {
          window.location.href = '/login';
        }
      }
      return false;
    };

    window.onunhandledrejection = function(event) {
      console.warn('Unhandled promise rejection:', event.reason);
    };
  </script>
