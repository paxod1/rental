  <script>
    // Global recovery function
    window.handleFatalError = function (reason) {
      console.warn('RECOVERY TRIGGERED: ' + reason);
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            for (let r of regs) { r.unregister(); }
          }).catch(function () { });
        }
        localStorage.clear();
        sessionStorage.clear();
        const cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i];
          const eqPos = cookie.indexOf("=");
          const name = eqPos > -1 ? cookie.substr(0, eqPos).trim() : cookie.trim();
          document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
        }
      } catch (e) { console.error('Cleanup error', e); }

      const loginUrl = '/login?recovered=true&t=' + Date.now();
      if (window.location.pathname !== '/login') {
        window.location.href = loginUrl;
      } else if (reason !== 'healthcheck') {
        window.location.reload();
      }
    };

    // Health check and early error listeners
    (function () {
      window.addEventListener('error', function (e) {
        if (e.target && e.target.tagName === 'SCRIPT') {
          window.handleFatalError('Script Fail: ' + e.target.src);
        }
      }, true);

      window.onerror = function (msg, url) {
        if (msg.includes('MIME') || (url && url.includes('.js'))) {
          window.handleFatalError('JS Error: ' + msg);
        }
        return false;
      };

      setTimeout(function () {
        const root = document.getElementById('root');
        if (root && !root.hasChildNodes()) {
          window.handleFatalError('healthcheck');
        }
      }, 3000);
    })();
  </script>
